name: 'AgentDbg Assert'
description: 'Run AgentDbg behavioral regression checks on agent traces'
inputs:
  agent-script:
    description: 'Python script that runs the agent (must use @trace)'
    required: true
  baseline:
    description: 'Path to baseline JSON file. If omitted, only the policy is enforced.'
    required: false
    default: ''
  policy:
    description: 'Path to policy YAML file. The policy is only applied if the file exists.'
    required: false
    default: '.agentdbg/policy.yaml'
  agentdbg-version:
    description: |
      AgentDbg version to use.
      Could be a version number starting with 'v' or a branch name starting with '@'.
      If a github identifier starts with 'v', use '@' prefix.
      Otherwise PyPI will be used.
      Default is "@main".
    required: false
    default: '@main'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  extra-args:
    description: 'Additional arguments to pass to agentdbg assert'
    required: false
    default: ''
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Check if baseline and policy are provided
      shell: bash
      run: |
        if [ -z "${{ inputs.baseline }}" ] && [ -z "${{ inputs.policy }}" ]; then
          echo "Either baseline, policy, or both must be provided."
          exit 1
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install AgentDbg
      env:
        AGENTDBG_REPO: 'https://github.com/RefineHQ-AI/agentdbg.git'
        AGENTDBG_VERSION: '${{ inputs.agentdbg-version }}'
      shell: bash
      run: |
        if [[ "${AGENTDBG_VERSION}" == "@"* ]]; then
          # GitHub identifier
          pip install git+${AGENTDBG_REPO}${AGENTDBG_VERSION}
        elif [[ "${AGENTDBG_VERSION}" == "v"* ]]; then
          # PyPI version number
          pip install "agentdbg==${AGENTDBG_VERSION:1}"
        else
          # Let's not allow any other values
          echo "Invalid agentdbg-version: ${AGENTDBG_VERSION}."
          echo "AgentDbg version must start with 'v' for PyPI version number"
          echo "or '@' for GitHub identifier."
          exit 1
        fi

    - name: Run agent
      shell: bash
      run: python ${{ inputs.agent-script }}

    - name: Get latest run ID
      shell: bash
      id: get-run
      run: |
        RUN_ID=$(agentdbg list --json | python -c "import sys,json; data=json.load(sys.stdin); print(data['runs'][0]['run_id'] if data.get('runs') else '')")
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

    - name: Run assertions
      shell: bash
      id: assert
      run: |
        ARGS=""
        if [ -n "${{ inputs.baseline }}" ]; then
          ARGS="$ARGS --baseline ${{ inputs.baseline }}"
        fi
        if [ -f "${{ inputs.policy }}" ]; then
          ARGS="$ARGS --policy ${{ inputs.policy }}"
        fi
        if [ -n "${{ inputs.extra-args }}" ]; then
          ARGS="$ARGS ${{ inputs.extra-args }}"
        fi
        agentdbg assert ${{ steps.get-run.outputs.run_id }} $ARGS --format markdown > agentdbg-report.md || echo "assert_failed=true" >> $GITHUB_OUTPUT

    - name: Post PR comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      uses: marocchino/sticky-pull-request-comment@v3.0.4
      with:
        path: agentdbg-report.md

    - name: Fail if assertions failed
      shell: bash
      if: steps.assert.outputs.assert_failed == 'true'
      run: exit 1
